name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: make verify

  public-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate installer release references
        run: |
          set -euo pipefail
          expected="v$(cat VERSION)"
          if ! grep -q "SAYANCE_REF=\"\${SAYANCE_REF:-$expected}\"" install.sh; then
            echo "SAYANCE_REF default in install.sh does not match $expected"
            echo "Expected pattern: SAYANCE_REF=\${SAYANCE_REF:-$expected}"
            exit 1
          fi
          if ! grep -q "/$expected/install\\.sh" README.md; then
            echo "README.md does not contain install.one-liner for $expected"
            echo "Expected pattern: /$expected/install.sh"
            exit 1
          fi
      - name: Resolve commit SHA
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Install via public curl one-liner
        env:
          SAYANCE_REF: ${{ steps.ref.outputs.sha }}
        run: |
          curl -fsSL "https://raw.githubusercontent.com/${{ github.repository }}/${{ steps.ref.outputs.sha }}/install.sh" \
            | bash
      - name: Verify installed CLI matches repo
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          expected="$(cat VERSION)"
          actual="$(sayance-lookup --version | awk '{print $2}')"
          if [ "$expected" != "$actual" ]; then
            echo "VERSION mismatch: repo=$expected installed=$actual"
            exit 1
          fi
          sayance-lookup pax > /dev/null
          count="$(sayance-lookup --list | wc -l | tr -d ' ')"
          if [ "$count" != "142" ]; then
            echo "Expected 142 utilities on CLI, got $count"
            exit 1
          fi
          echo "public install OK: sayance $actual, 142 utilities"
      - name: Verify agent-specific installs
        run: |
          set -euo pipefail
          expected="$(cat VERSION)"
          script_url="https://raw.githubusercontent.com/${{ github.repository }}/${{ steps.ref.outputs.sha }}/install.sh"
          for target in claude codex; do
            tmp_home="$(mktemp -d)"
            curl -fsSL "$script_url" \
              | HOME="$tmp_home" SAYANCE_REF="${{ steps.ref.outputs.sha }}" bash -s "$target"
            case "$target" in
              claude)
                expected_dir="$tmp_home/.claude/skills/sayance"
                absent_dir="$tmp_home/.codex"
                ;;
              codex)
                expected_dir="$tmp_home/.codex/skills/sayance"
                absent_dir="$tmp_home/.claude"
                ;;
              *)
                echo "Unknown install target: $target"
                exit 1
                ;;
            esac
            if [ ! -d "$expected_dir" ]; then
              echo "Missing expected skill dir for $target at $expected_dir"
              exit 1
            fi
            if [ -e "$absent_dir" ]; then
              echo "Unexpected install target artifact for $target at $absent_dir"
              exit 1
            fi
            actual="$(HOME="$tmp_home" PATH="$tmp_home/.local/bin:$PATH" sayance-lookup --version | awk '{print $2}')"
            if [ "$expected" != "$actual" ]; then
              echo "VERSION mismatch for $target install: repo=$expected installed=$actual"
              exit 1
            fi
            rm -rf "$tmp_home"
          done
          echo "public install OK: claude and codex targets"
